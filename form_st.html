<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Contact Form</title>
    <link rel="stylesheet" href="form_st.css">
</head>

<body>
    <div class="form-container">
        <form>
            <h2>Contact Us</h2>
            <label for="name">Name: </label>
            <input
                type="text"
                id="name"
                name="name"
                required>

            <label for="email">Email: </label>
            <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="example@gmail.com">

            <label for="message">Message: </label>
            <textarea
                id="message"
                rows="4"
                cols="auto">
                </textarea>

            <button 
                type="submit"
                id="button">
            Submit Form</button>
        </form>
    </div>
</body>

</html>
